<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xamx AI Verification</title>
</head>

<body style="margin: 0; padding: 0; background: #f5f7fb; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table width="600" style="background: white; margin-top: 40px; overflow: hidden; border: 1px solid #e5e7eb;">
                    
                    <tr>
                        <td style="padding: 30px; border-bottom: 1px solid #e5e7eb;">
                            <img src="../../../frontend/src/assets/Logo/Xamx.Ai - Black.png" alt="Xamx AI" height="42" />
                            <span>Xamx.Ai</span>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 50px;">
                            
                            <h1 style="margin: 0; font-size: 34px; font-weight: 700; color: #111827;">
                                Verify your email
                            </h1>

                            <p style="margin-top: 20px; font-size: 16px; line-height: 28px; color: #4b5563;">
                                Use the verification code below to complete your Xamx AI account setup.
                            </p>

                            <div style="margin-top: 40px; margin-bottom: 40px; text-align: center;">
                                <div style="display: inline-block; padding: 18px 40px; background: #f3f4f6; border: 1px solid #d1d5db;  font-size: 38px; font-weight: 700; letter-spacing: 10px; color: #111827;">
                                    {{OTP_CODE}}
                                </div>
                            </div>

                            <p style="font-size: 15px; color: #6b7280;">
                                This verification code expires in <strong>10 minutes</strong>.
                            </p>

                            <p style="font-size: 15px; color: #6b7280;">
                                If you did not request this email, you can safely ignore it.
                            </p>

                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 30px; background: #f9fafb; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 13px; color: #6b7280;">
                                © 2026 Xamx AI
                            </p>
                            <p style="margin-top: 10px; font-size: 13px; color: #6b7280;">
                                Security • Privacy • Support
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
